version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: coinsight-postgres
    env_file:
      - .env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: coinsight-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: coinsight-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: coinsight-rabbitmq
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  gateway:
    build: .
    container_name: coinsight-gateway
    env_file:
      - apps/gateway/.env
    ports:
      - '3005:3005'
    depends_on:
      - user-wallet-service
      - analytics-service
    restart: unless-stopped

  user-wallet-service:
    build: .
    container_name: coinsight-user-wallet-service
    env_file:
      - apps/user-wallet-service/.env
    ports:
      - '3006:3006'
    depends_on:
      - postgres
      - rabbitmq
    restart: unless-stopped

  indexer-service:
    build: .
    container_name: coinsight-indexer-service
    env_file:
      - apps/indexer-service/.env
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  analytics-service:
    build: .
    container_name: coinsight-analytics-service
    env_file:
      - apps/analytics-service/.env
    ports:
      - '3007:3007'
    depends_on:
      - mongodb
      - rabbitmq
    restart: unless-stopped

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  rabbitmq_data:
